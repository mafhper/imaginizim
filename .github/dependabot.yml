version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: tuesday
      time: '09:00'
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 10
    versioning-strategy: increase-if-necessary
    cooldown:
      default-days: 5
      semver-patch-days: 3
      semver-minor-days: 7
      semver-major-days: 30
    labels:
      - dependencies
    groups:
      typescript-eslint:
        patterns:
          - '@typescript-eslint/*'
    ignore:
      - dependency-name: 'vite'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: '@eslint/js'
        update-types:
          - 'version-update:semver-major'
      - dependency-name: 'eslint'
        update-types:
          - 'version-update:semver-major'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: tuesday
      time: '09:30'
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 10
    cooldown:
      default-days: 5
    labels:
      - dependencies
      - ci
